<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FMCSA — قريباً</title>


  <style>
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    @font-face {
      font-family: "CairoFamily";
      src: url("Assets/Font/Cairo-Bold.ttf") format("truetype");
      font-weight: normal;
      font-style: normal;
    }

    @font-face {
      font-family: "MontserratFamily";
      src: url("Assets/Font/Montserrat-Bold.ttf") format("truetype");
      font-weight: normal;
      font-style: normal;
    }

    :root {
      --navy: #06111f;
      --mid: #0a1c34;
      --accent: #3b82f6;
      --bright: #7dd3fc;
      --glow: #38bdf8;
      --frost: rgba(180, 220, 255, 0.08);
      --line: rgba(100, 170, 255, 0.14);
    }

    html,
    body {
      height: 100%;
      overflow: hidden;
      background: var(--navy);
      color: #e8f1ff;
    }

    /* ── LAYERED BACKGROUND (mirrors PSD structure) ── */
    body {
      font-family: 'CairoFamily', system-ui, -apple-system, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      position: relative;
    }

    /* background.jpg + glow overlay as a fixed pseudo-element */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      z-index: 0;
      background-image: url('Assets/IMG001.png');
      background-size: cover;
      background-position: center top;
      opacity: 0.28;
      mix-blend-mode: luminosity;
    }

    body::after {
      content: '';
      position: fixed;
      inset: 0;
      z-index: 1;
      background:
        radial-gradient(ellipse 70% 55% at 38% 28%, rgba(90, 80, 200, 0.38) 0%, transparent 65%),
        radial-gradient(ellipse 50% 40% at 70% 70%, rgba(30, 20, 100, 0.25) 0%, transparent 60%),
        linear-gradient(180deg, rgba(20, 19, 69, 0.0) 0%, rgba(10, 9, 40, 0.55) 100%);
      pointer-events: none;
    }

    /* ── canvas ── */
    #bg-canvas {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      z-index: 1;
      pointer-events: none;
    }

    /* ── center vignette ── */
    .vignette {
      position: fixed;
      inset: 0;
      z-index: 2;
      pointer-events: none;
      background:
        radial-gradient(ellipse 60% 55% at 50% 50%,
          rgba(6, 17, 31, 0.78) 0%,
          rgba(6, 17, 31, 0.38) 60%,
          transparent 100%);
    }

    /* ── floating particles behind content ── */
    .dots {
      position: fixed;
      inset: 0;
      z-index: 3;
      pointer-events: none;
      overflow: hidden;
    }

    .dot {
      position: absolute;
      border-radius: 50%;
      background: var(--bright);
      opacity: 0;
      animation: floatDot linear infinite;
    }

    @keyframes floatDot {
      0% {
        transform: translateY(0) scale(1);
        opacity: 0;
      }

      10% {
        opacity: 0.35;
      }

      90% {
        opacity: 0.12;
      }

      100% {
        transform: translateY(-100px) scale(0.4);
        opacity: 0;
      }
    }

    /* ── layout ── */
    .content {
      position: relative;
      z-index: 10;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0;
      padding: 2rem 1.5rem 2.5rem;
      width: min(460px, 94vw);
    }

    /* ── logo ── */
    .logo-wrap {
      margin-bottom: 1.1rem;
      animation: fadeUp 1s .1s cubic-bezier(.16, 1, .3, 1) both;
    }

    .logo-wrap img {
      width: min(260px, 60vw);
      filter: drop-shadow(0 0 28px rgba(56, 189, 248, 0.35));
    }

    /* ── badge ── */
    .badge {
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      font-family: 'MontserratFamily', system-ui, -apple-system, sans-serif;
      font-size: 0.68rem;
      letter-spacing: 0.12em;
      color: var(--glow);
      background: rgba(56, 189, 248, 0.08);
      border: 1px solid rgba(56, 189, 248, 0.22);
      padding: 0.3rem 0.9rem;
      border-radius: 999px;
      margin-bottom: 1.3rem;
      animation: fadeUp 1s .22s cubic-bezier(.16, 1, .3, 1) both;
    }

    .badge::before {
      content: '';
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--glow);
      animation: pulse 2s ease-in-out infinite;
    }

    @keyframes pulse {

      0%,
      100% {
        opacity: 1;
        transform: scale(1);
      }

      50% {
        opacity: 0.4;
        transform: scale(0.7);
      }
    }

    /* ── heading ── */
    h1 {
      font-family: 'CairoFamily', system-ui, -apple-system, sans-serif;
      font-size: clamp(4.5rem, 13vw, 7.5rem);
      font-weight: 800;
      letter-spacing: -0.01em;
      margin-bottom: 1.4rem;
      background: linear-gradient(140deg, #ffffff 20%, var(--bright) 65%, var(--glow) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      animation: fadeUp 1s .33s cubic-bezier(.16, 1, .3, 1) both;
    }

    /* ── divider ── */
    .divider {
      width: 100%;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--line), rgba(100, 170, 255, 0.3), var(--line), transparent);
      margin-bottom: 1.4rem;
      animation: fadeUp 1s .42s cubic-bezier(.16, 1, .3, 1) both;
    }

    /* ── body text ── */
    .text-block {
      display: flex;
      flex-direction: column;
      gap: 0.55rem;
      margin-bottom: 0.9rem;
      animation: fadeUp 1s .5s cubic-bezier(.16, 1, .3, 1) both;
    }

    .text-ar {
      font-size: clamp(1rem, 2.6vw, 1.18rem);
      font-weight: 500;
      color: rgba(220, 238, 255, 0.88);
      line-height: 1.7;
    }

    .text-en {
      direction: ltr;
      font-family: 'MontserratFamily', system-ui, -apple-system, sans-serif;
      font-size: clamp(0.72rem, 1.7vw, 0.82rem);
      color: rgba(130, 190, 255, 0.55);
      letter-spacing: 0.02em;
      line-height: 1.6;
    }

    /* ── follow text ── */
    .follow {
      font-size: clamp(0.9rem, 2.2vw, 1rem);
      font-weight: 500;
      color: rgba(180, 215, 255, 0.6);
      margin-bottom: 1.5rem;
      animation: fadeUp 1s .58s cubic-bezier(.16, 1, .3, 1) both;
    }

    /* ── social button ── */
    .social-link {
      display: inline-flex;
      align-items: center;
      gap: 0.6rem;
      color: white;
      text-decoration: none;
      direction: ltr;
      font-family: 'MontserratFamily', system-ui, -apple-system, sans-serif;
      font-weight: 700;
      letter-spacing: 0.04em;
      padding: 0.72rem 1.8rem;
      border-radius: 999px;
      position: relative;
      overflow: hidden;
      border: 1px solid rgba(56, 189, 248, 0.35);
      background: rgba(56, 189, 248, 0.07);
      transition: transform .25s, border-color .25s, background .25s;
      animation: fadeUp 1s .66s cubic-bezier(.16, 1, .3, 1) both;
    }

    .social-link::before {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(circle at 50% 0%, rgba(56, 189, 248, 0.2) 0%, transparent 70%);
      opacity: 0;
      transition: opacity .3s;
    }

    .social-link:hover {
      transform: translateY(-3px);
      border-color: rgba(56, 189, 248, 0.65);
      background: rgba(56, 189, 248, 0.13);
    }

    .social-link:hover::before {
      opacity: 1;
    }

    .social-link svg {
      flex-shrink: 0;
    }

    @keyframes fadeUp {
      from {
        opacity: 0;
        transform: translateY(22px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @media (max-width: 420px) {
      h1 {
        font-size: 3.8rem;
      }

      .logo-wrap img {
        width: 52vw;
      }
    }
  </style>
</head>

<body>

  <canvas id="bg-canvas"></canvas>
  <div class="vignette"></div>

  <!-- floating micro-dots -->
  <div class="dots" id="dots"></div>

  <div class="content">
    <div class="logo-wrap">
      <img src="Assets/White V Logo.png" alt="FMCS Students Association">
    </div>

    <div class="badge">COMING SOON</div>

    <h1>قريباً</h1>

    <div class="divider"></div>

    <div class="text-block">
      <p class="text-ar">نعمل على إطلاق موقع رابطة طلاب كلية العلوم الرياضية والحاسوب بجامعة الجزيرة</p>
      <p class="text-en">Launching the official site for the FMCS Students' Association — University of Gezira</p>
    </div>

    <p class="follow">تابعونا للمزيد من الأخبار والفعاليات</p>

    <a class="social-link" href="https://www.facebook.com/profile.php?id=61582223769511" target="_blank"
      rel="noopener noreferrer">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="currentColor">
        <path
          d="M24 12.073C24 5.405 18.627 0 12 0S0 5.405 0 12.073C0 18.1 4.388 23.094 10.125 24v-8.437H7.078v-3.49h3.047V9.41c0-3.025 1.792-4.697 4.533-4.697 1.312 0 2.686.235 2.686.235v2.97h-1.513c-1.491 0-1.956.93-1.956 1.887v2.267h3.328l-.532 3.49h-2.796V24C19.612 23.094 24 18.1 24 12.073z" />
      </svg>
      FMCSA on Facebook
    </a>

  </div>

  <script>
    (() => {
      /* ── floating micro-dots ── */
      const dotsEl = document.getElementById('dots');
      for (let i = 0; i < 18; i++) {
        const d = document.createElement('div');
        d.className = 'dot';
        const size = Math.random() * 3 + 1.5;
        d.style.cssText = `
        width:${size}px; height:${size}px;
        left:${Math.random() * 100}%;
        bottom:${Math.random() * 30}%;
        animation-duration:${5 + Math.random() * 8}s;
        animation-delay:${Math.random() * 8}s;
      `;
        dotsEl.appendChild(d);
      }

      /* ── hourglass canvas ── */
      const canvas = document.getElementById('bg-canvas');
      const ctx = canvas.getContext('2d');
      let W, H, cx, cy;

      function resize() {
        W = canvas.width = window.innerWidth;
        H = canvas.height = window.innerHeight;
        cx = W / 2; cy = H / 2;
      }
      window.addEventListener('resize', resize);
      resize();

      function getHG() {
        const scale = Math.min(W, H);
        const hw = scale * 0.285;
        const hh = scale * 0.375;
        const nw = scale * 0.020;
        const top = cy - hh, bot = cy + hh;
        const cp = hh * 0.50;
        return { hw, hh, nw, top, bot, cp };
      }

      function hourglassPath(g) {
        const { hw, nw, top, bot, cp } = g;
        const p = new Path2D();
        p.moveTo(cx - hw, top);
        p.lineTo(cx + hw, top);
        p.bezierCurveTo(cx + hw, top + cp, cx + nw, cy - nw * 2, cx + nw, cy);
        p.bezierCurveTo(cx + nw, cy + nw * 2, cx + hw, bot - cp, cx + hw, bot);
        p.lineTo(cx - hw, bot);
        p.bezierCurveTo(cx - hw, bot - cp, cx - nw, cy + nw * 2, cx - nw, cy);
        p.bezierCurveTo(cx - nw, cy - nw * 2, cx - hw, top + cp, cx - hw, top);
        p.closePath();
        return p;
      }

      /* ── particles ── */
      const COUNT = 280;
      const SETTLE_REST = 1900;
      let pileTop = 0;

      function randRange(a, b) { return a + Math.random() * (b - a); }

      function makeParticle(stagger) {
        const g = getHG();
        const frac = stagger !== undefined ? stagger : Math.random();
        const spawnY = g.top + frac * (cy - g.nw * 2.5 - g.top);
        const xRange = g.hw * (1 - frac) + g.nw * frac;
        return {
          x: cx + randRange(-xRange + 2, xRange - 2),
          y: spawnY,
          size: randRange(1.2, 2.7),
          alpha: randRange(0.28, 0.68),
          speed: randRange(0.45, 1.7),
          hue: randRange(195, 230),
          sat: randRange(65, 90),
          phase: 'falling',
          settleTimer: 0,
          opacity: 1,
        };
      }

      const particles = [];
      for (let i = 0; i < COUNT; i++) particles.push(makeParticle(i / COUNT));

      let lastTime = performance.now();

      function update(now) {
        const dt = Math.min(now - lastTime, 32);
        lastTime = now;
        const g = getHG();
        const neckTop = cy - g.nw * 2.5;
        const neckBot = cy + g.nw * 2.5;
        const pileSurface = g.bot - (g.hh * 0.91) * pileTop;
        let settledCount = 0;

        particles.forEach(p => {
          if (p.phase === 'settled') {
            settledCount++;
            p.settleTimer += dt;
            const fadeStart = SETTLE_REST * 0.7;
            if (p.settleTimer >= fadeStart)
              p.opacity = 1 - (p.settleTimer - fadeStart) / (SETTLE_REST - fadeStart);
            if (p.settleTimer >= SETTLE_REST) {
              const fresh = makeParticle();
              fresh.opacity = 0;
              Object.assign(p, fresh);
            }
            return;
          }
          if (p.opacity < 1) p.opacity = Math.min(1, p.opacity + dt * 0.003);

          if (p.phase === 'falling') {
            p.y += p.speed;
            if (p.y >= neckTop) p.phase = 'passing';
            return;
          }
          if (p.phase === 'passing') {
            p.y += p.speed * 0.8;
            p.x += (cx - p.x) * 0.10;
            if (p.y >= neckBot) {
              p.phase = 'dropping';
              p.x = cx + (p.x - cx) * 0.5 + randRange(-g.nw, g.nw);
            }
            return;
          }
          if (p.phase === 'dropping' || p.phase === 'settling') {
            p.y += p.speed;
            if (p.phase === 'dropping') {
              const spread = (p.y - neckBot) / (g.bot - neckBot);
              const targetX = cx + (p.x - cx) * (1 + spread * 0.4);
              p.x += (targetX - p.x) * 0.04;
            }
            if (p.y >= pileSurface - p.size) {
              p.y = pileSurface - p.size;
              p.phase = 'settled';
              p.settleTimer = 0;
              p.opacity = 1;
              pileTop = Math.min(0.72, pileTop + 0.0008);
            }
          }
        });

        const inFlight = COUNT - settledCount;
        pileTop = Math.max(0, pileTop - inFlight * 0.0000008 * dt);
      }

      function draw() {
        ctx.clearRect(0, 0, W, H);
        const g = getHG();
        const hp = hourglassPath(g);

        ctx.save();
        ctx.clip(hp);

        /* inner fill — cooler, deeper blue */
        const ig = ctx.createRadialGradient(cx, g.top, 0, cx, cy, g.hh * 1.2);
        ig.addColorStop(0, 'rgba(30,80,180,0.18)');
        ig.addColorStop(.5, 'rgba(10,40,100,0.26)');
        ig.addColorStop(1, 'rgba(4,14,45,0.0)');
        ctx.fillStyle = ig;
        ctx.fillRect(0, 0, W, H);

        /* pile */
        const surface = g.bot - (g.hh * 0.91) * pileTop;
        if (pileTop > 0.01) {
          const sg = ctx.createLinearGradient(cx, surface, cx, g.bot);
          sg.addColorStop(0, 'rgba(56,189,248,0.12)');
          sg.addColorStop(.4, 'rgba(30,120,220,0.18)');
          sg.addColorStop(1, 'rgba(10,60,160,0.28)');
          ctx.fillStyle = sg;
          ctx.fillRect(cx - g.hw, surface, g.hw * 2, g.bot - surface);
        }

        /* particles */
        particles.forEach(p => {
          const inLower = p.y > cy;
          let a = p.alpha * p.opacity;
          if (p.phase === 'settled') a *= 0.5;
          else if (inLower) a *= Math.max(0.1, 1 - (p.y - cy) / (g.bot - cy) * 0.5);
          ctx.beginPath();
          ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
          ctx.fillStyle = `hsla(${p.hue},${p.sat}%,88%,${a})`;
          ctx.fill();
        });

        ctx.restore();

        /* glass frame */
        const fw = Math.max(1.5, Math.min(W, H) * 0.014);
        ctx.strokeStyle = 'rgba(100,180,255,0.22)';
        ctx.lineWidth = fw;
        ctx.lineJoin = 'round';
        ctx.stroke(hp);

        /* subtle inner highlight on glass edge */
        ctx.strokeStyle = 'rgba(200,235,255,0.06)';
        ctx.lineWidth = fw * 0.4;
        ctx.stroke(hp);

        /* top & bottom caps */
        const bh = fw * 0.85;
        const grad = ctx.createLinearGradient(cx - g.hw, 0, cx + g.hw, 0);
        grad.addColorStop(0, 'rgba(56,189,248,0.0)');
        grad.addColorStop(0.2, 'rgba(56,189,248,0.25)');
        grad.addColorStop(0.5, 'rgba(100,200,255,0.35)');
        grad.addColorStop(0.8, 'rgba(56,189,248,0.25)');
        grad.addColorStop(1, 'rgba(56,189,248,0.0)');
        ctx.fillStyle = grad;
        ctx.fillRect(cx - g.hw - fw / 2, g.top - bh / 2, g.hw * 2 + fw, bh);
        ctx.fillRect(cx - g.hw - fw / 2, g.bot - bh / 2, g.hw * 2 + fw, bh);

        /* neck shimmer */
        const ns = ctx.createLinearGradient(cx - g.nw * 5, cy, cx + g.nw * 5, cy);
        ns.addColorStop(0, 'rgba(100,200,255,0)');
        ns.addColorStop(0.5, 'rgba(160,230,255,0.6)');
        ns.addColorStop(1, 'rgba(100,200,255,0)');
        ctx.fillStyle = ns;
        ctx.fillRect(cx - g.nw * 5, cy - g.nw * 3.5, g.nw * 10, g.nw * 7);
      }

      function loop(now) {
        update(now);
        draw();
        requestAnimationFrame(loop);
      }
      requestAnimationFrame(loop);
    })();
  </script>
</body>

</html>
